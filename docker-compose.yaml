services:

  localstack:
    container_name: localstack
    image: localstack/localstack:latest
    ports:
      - "${LOCALSTACK_HOST}:${LOCALSTACK_PORT1}:${LOCALSTACK_PORT1}"
      - "${LOCALSTACK_HOST}:${LOCALSTACK_PORT2}:${LOCALSTACK_PORT2}"
      
    environment:
      SERVICES: sqs,lambda,ses,iam,cloudwatch,logs
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_TOKEN}
      DEBUG: ${DEBUG:-0}
      LAMBDA_EXECUTOR: docker
      LAMBDA_DOCKER_NETWORK: minha-rede-local-docker 
    volumes:
      - "./localstack/volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - minha-rede-local-docker  
      
