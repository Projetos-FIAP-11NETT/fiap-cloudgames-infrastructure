apiVersion: v1
kind: Pod
metadata:
  name: notification-api
  labels:
    app: notification-api
  annotations:
    description: "Pod para a API de Notificações, responsável por enviar emails e processar mensagens do RabbitMQ."
spec:
  containers: 
    - name: notification-api
      image: projetofiap/notification-api:3
      ports:
        - containerPort: 80
      resources:
        requests: #minimum resources guaranteed to the container
          memory: "128Mi"
          cpu: "0.25"
        limits: #maximum resources that the container can use
          memory: "256Mi"
          cpu: "0.5"
      env:
        # RabbitMQ
        - name: RabbitmqSettings__Address
          value: "rabbitmq"
        - name: RabbitmqSettings__Port
          value: "5672"
        - name: RabbitmqSettings__VirtualHost
          value: "/"
        - name: RabbitmqSettings__Username
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RabbitmqSettings__Password
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password

        # Email (MailHog)
        - name: EmailSettings__SmtpHost
          value: "mailhog"
        - name: EmailSettings__SmtpPort
          value: "1025"
        - name: EmailSettings__UseMailHog
          value: "true"