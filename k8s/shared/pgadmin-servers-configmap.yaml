apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  labels:
    app: pgadmin
  annotations:
    description: "ConfigMap contendo o arquivo servers.json para o PgAdmin."
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "payments-server",
          "Group": "Servers",
          "Host": "postgresdb-payments",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgresAdmin",
          "SSLMode": "prefer",
        },
        "2": {
          "Name": "users-server",
          "Group": "Servers",
          "Host": "postgresdb-users",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgresAdmin",
          "SSLMode": "prefer",
        },
        "3": {
          "Name": "catalog-server",
          "Group": "Servers",
          "Host": "postgresdb-catalog",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgresAdmin",
          "SSLMode": "prefer",
        }
      }
    }
