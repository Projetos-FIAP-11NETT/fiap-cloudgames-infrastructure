apiVersion: v1
kind: Service

metadata:
  name: rabbitmq
  
  labels:
    app: rabbitmq
  
  annotations:
    description: "Service para o RabbitMQ, expondo a porta 5672 para comunicação AMQP e a porta 15672 para acesso à interface de gerenciamento."

spec:
  type: NodePort

  selector:
    app: rabbitmq

  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
      name: amqp

    - protocol: TCP
      port: 15672
      targetPort: 15672
      nodePort: 30031
      name: management

# acessar localmente: http://localhost:30031/      