apiVersion: v1
kind: Secret

metadata:
  name: shared-secret
  labels:
    app: shared
  annotations:
    description: "Secret compartilhado para a API de Notificações, Usuário, Calatogo e Pagamento."

type: Opaque

stringData:
  # rabbitmq
  RABBITMQ_USERNAME: "admin"
  RABBITMQ_PASSWORD: "password"

  # MongoDB
  MONGO_ROOT_USER: "mongoAdmin"
  MONGO_ROOT_PASSWORD: "mongoPassword"
