apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-pvc
  labels:
    app: pgadmin
  annotations:
    description: "PersistentVolumeClaim para o PgAdmin, garantindo armazenamento persistente para os dados do PgAdmin mesmo que o pod seja reiniciado ou recriado."
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi