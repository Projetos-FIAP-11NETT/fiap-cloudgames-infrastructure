apiVersion: v1
kind: ConfigMap

metadata:
  name: pgadmin-config

data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "Users DB",
          "Group": "Databases",
          "Host": "postgresdb-users",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgresAdmin",
          "SSLMode": "prefer"
        },
        "2": {
          "Name": "Payments DB",
          "Group": "Databases",
          "Host": "postgresdb-payments",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgresAdmin",
          "SSLMode": "prefer"
        },
        "3": {
          "Name": "Catalog DB",
          "Group": "Databases",
          "Host": "postgresdb-catalog",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgresAdmin",
          "SSLMode": "prefer"
        }
      }
    }