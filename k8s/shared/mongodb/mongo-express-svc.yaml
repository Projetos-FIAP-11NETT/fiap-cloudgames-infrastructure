apiVersion: v1
kind: Service

metadata:
  name: mongo-express
  labels:
    app: mongo-express
  
  annotations:
    description: "Service para o Mongo Express, interface web para gerenciar MongoDB."

spec:
  type: NodePort

  selector:
    app: mongo-express

  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30084
      name: http

# acessar localmente: http://localhost:30084
