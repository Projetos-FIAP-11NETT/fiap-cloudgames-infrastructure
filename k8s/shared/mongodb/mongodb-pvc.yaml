apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: mongodb-pvc

  labels:
    app: mongodb

  annotations:
    description: "PersistentVolumeClaim para o banco de dados MongoDB, garantindo armazenamento persistente para os dados do banco mesmo que o pod seja reiniciado ou recriado."

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 10Gi