apiVersion: v1
kind: Service

metadata:
  name: redisinsight
  labels:
    app: redisinsight
  
  annotations:
    description: "Service para o Redis Insight, interface web para gerenciar Redis."

spec:
  type: NodePort

  selector:
    app: redisinsight

  ports:
    - port: 5540
      targetPort: 5540
      nodePort: 30540
      name: http

# acessar localmente: http://localhost:30540
