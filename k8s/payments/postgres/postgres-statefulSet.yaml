apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgresdb-payments

  labels:
    app: postgresdb-payments

  annotations:
    description: "Pod para o banco de dados PostgreSQL, utilizado pela API de Pagamentos para armazenar informações de transações e pagamentos."

spec:
  serviceName: postgresdb-payments
  replicas: 1

  selector:
    matchLabels:
      app: postgresdb-payments

  template:
    metadata:
      labels:
        app: postgresdb-payments      

    spec:
      containers:
        - name: postgresdb-payments
          image: postgres:16
    
          ports:
            - containerPort: 5432

          resources:
            requests: #minimum resources guaranteed to the container
              memory: "256Mi"
              cpu: "250m"
      
            limits: #maximum resources that the container can use
              memory: "512Mi"
              cpu: "500m"

          env:
            - name: POSTGRES_DB
              value: "payments-db"
    
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: POSTGRES_USER
    
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: POSTGRES_PASSWORD
    
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
    
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc-payments