apiVersion: v1
kind: Service

metadata:
  name: payments-api

  labels:
    app: payments-api

  annotations:
    description: "Service para a API de Pagamentos, expondo a porta 80 para acesso interno no cluster."

spec:
  type: NodePort

  selector:
    app: payments-api
    
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30081

# acessar localmente: http://localhost:30081/scalar