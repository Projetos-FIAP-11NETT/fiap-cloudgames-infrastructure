apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-deployment
  labels:
    app: payments-api
  annotations:
    description: "Deployment para a API de Pagamento, garantindo alta disponibilidade e escalabilidade para o serviço de processamento de transações."
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: payments
          image: projetofiap/payments-api:2
          ports:
            - containerPort: 8080
          resources:
            requests: #minimum resources guaranteed to the container
              memory: "128Mi"
              cpu: "0.25"
            limits: #maximum resources that the container can use
              memory: "256Mi"
              cpu: "0.5"
          env:
          # RabbitMQ
          - name: RabbitmqSettings__Address
            valueFrom:
              configMapKeyRef:
                name: shared-config
                key: RABBITMQ_ADDRESS
          - name: RabbitmqSettings__Port
            valueFrom:
              configMapKeyRef:
                name: shared-config
                key: RABBITMQ_PORT
          - name: RabbitmqSettings__VirtualHost
            valueFrom:
              configMapKeyRef:
                name: shared-config
                key: RABBITMQ_VIRTUAL_HOST
          - name: RabbitmqSettings__Username
            valueFrom:
              secretKeyRef:
                name: shared-secret
                key: RABBITMQ_USERNAME
          - name: RabbitmqSettings__Password
            valueFrom:
              secretKeyRef:
                name: shared-secret
                key: RABBITMQ_PASSWORD
          # Db
          - name: ConnectionStrings__DefaultConnection
            valueFrom:
              secretKeyRef:
                name: payments-secret
                key: DB_USER_CONNECTION_STRING
          # Payment
          - name: Payment__ApprovalRate
            valueFrom:
              configMapKeyRef:
                name: payments-config
                key: PAYMENT_APPROVAL_RATE