apiVersion: v1
kind: Service
metadata:
  name: payments-api
  labels:
    app: payments-api
  annotations:
    description: "Service para a API de Pagamentos, expondo a porta 80 para acesso interno no cluster."
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
      nodePort: 30081