apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalog-deployment

  labels:
    app: catalog-api

  annotations:
    description: "Deployment para a API de Catálogo, garantindo alta disponibilidade e escalabilidade para o serviço de gerenciamento de produtos."

spec:
  replicas: 1

  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      containers:
        - name: catalog
          image: projetofiap/catalog-api:latest
          
          ports:
            - containerPort: 8080
          
          resources:
            requests: #minimum resources guaranteed to the container
              memory: "128Mi"
              cpu: "250m"
            limits: #maximum resources that the container can use
              memory: "256Mi"
              cpu: "500m"
          
          env:
            # Mongodb
            - name: MongoDB__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: MONGO_CONNECTION_STRING

            - name: MongoDB__Database
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: MONGO_DATABASE

            # Redis
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: REDIS_CONNECTION_STRING

            # SQS
            - name: SqsSettings__Region
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: SQS_REGION

            - name: SqsSettings__AccessKey
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: SQS_ACCESS_KEY

            - name: SqsSettings__SecretKey
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: SQS_SECRET_KEY

            - name: SqsSettings__ServiceURL
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: SQS_SERVICE_URL

            - name: SqsSettings__EmailQueueURL
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: SQS_EMAIL_QUEUE_URL

            # Db
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: DB_USER_CONNECTION_STRING

            # New Relic
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: NEW_RELIC_LICENSE_KEY
            - name: NEW_RELIC_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: NEW_RELIC_APP_NAME 
            - name: NEW_RELIC_LOG
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: NEW_RELIC_LOG
            - name: NEW_RELIC_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: NEW_RELIC_LOG_LEVEL
            - name: NEW_RELIC_APPLICATION_LOGGING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: NEW_RELIC_APPLICATION_LOGGING_ENABLED
            - name: NEW_RELIC_APPLICATION_LOGGING_FORWARDING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: NEW_RELIC_APPLICATION_LOGGING_FORWARDING_ENABLED
            - name: NEW_RELIC_APPLICATION_LOGGING_LOCAL_DECORATING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: NEW_RELIC_APPLICATION_LOGGING_LOCAL_DECORATING_ENABLED