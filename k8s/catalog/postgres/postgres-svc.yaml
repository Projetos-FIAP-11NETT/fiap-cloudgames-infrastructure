apiVersion: v1
kind: Service

metadata:
  name: postgresdb-catalog

  labels:
    app: postgresdb-catalog

  annotations:
    description: "Service para o banco de dados PostgreSQL da API de Catálogo, permitindo que outros pods no cluster se comuniquem com o banco de dados usando o nome do serviço como hostname."

spec:
  clusterIP: None
  
  selector:
    app: postgresdb-catalog

  ports:
    - port: 5432
      targetPort: 5432
  