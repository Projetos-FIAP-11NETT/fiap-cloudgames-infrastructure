apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgresdb-users
  
  labels:
    app: postgresdb-users

  annotations:
    description: "Pod para o banco de dados PostgreSQL, utilizado pela API de Usuário para armazenar dados do usuário e permissões."    

spec:
  serviceName: postgresdb-users
  replicas: 1

  selector:
    matchLabels:
      app: postgresdb-users

  template:
    metadata:
      labels:
        app: postgresdb-users

    spec:
      containers:
        - name: postgresdb-users
          image: postgres:16

          ports:
            - containerPort: 5432

          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            
            limits:
              memory: "256Mi"
              cpu: "500m"

          env:
            - name: POSTGRES_DB
              value: "users-db"

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: POSTGRES_PASSWORD

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc-users