apiVersion: v1
kind: Service
metadata:
  name: users-api
  labels:
    app: users-api
  annotations:
    description: "Service para a API de Usuários, expondo a porta 80 para acesso interno no cluster."
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30082
  selector:
    app: users-api

# acessar localmente: http://localhost:30082/scalar